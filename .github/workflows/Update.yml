name: Update

on:
  workflow_dispatch:
  repository_dispatch:
    types: [restart]

permissions:
  contents: write
  actions: write

jobs:
  update:
    strategy:
      fail-fast: true
      matrix:
        server: [CN, GL, JP, JPPC]
    runs-on: ubuntu-latest
    env:
      PYTHONUTF8: 1
      PYTHONUNBUFFERED: "1"
      GH_TOKEN: ${{ github.token }}
    outputs:
      should_restart: ${{ steps.check_reason.outputs.should_restart }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0'

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Set up Node.js
        if: matrix.server == 'JPPC'
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install asar tool
        if: matrix.server == 'JPPC'
        run: npm install -g @electron/asar

      - name: Install SSH Key
        uses: shimataro/ssh-key-action@v2
        with:
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          known_hosts: unnecessary
          if_key_exists: replace

      - name: Login
        run: |
          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions"

      - name: Install Python requirements
        run: |
          pip install -r requirements.txt

      - name: Clone BA-PC-SRC
        if: matrix.server == 'JPPC'
        run: |
          git clone git@github.com:beichen23333/BA-PC-SRC.git

      - name: Run Update
        id: update
        run: |
          start_time=$(date +%s)
          timeout_limit=$((4 * 60 * 60))
          
          while true; do
            current_time=$(date +%s)
            elapsed=$((current_time - start_time))
            if [ $elapsed -ge $timeout_limit ]; then
              echo "timeout=true" >> $GITHUB_OUTPUT
              break
            fi

            python update.py ${{ matrix.server }}

            if [ -f "UPDATE_FOUND" ]; then
              echo "detected=true" >> $GITHUB_OUTPUT
              if [ -f "MAJOR_UPDATE" ]; then
                echo "major=true" >> $GITHUB_OUTPUT
              fi
              break
            fi
            sleep 60
          done

      - name: Commit and Push Changes
        if: steps.update.outputs.detected == 'true'
        run: |
          git pull
          git add BA_${{ matrix.server }}.env
          git commit -m "${{ matrix.server }}服务器存在变动。"
          git push

      - name: Get Version Name
        if: steps.update.outputs.major == 'true' && matrix.server != 'JPPC'
        id: get_version
        run: |
          chmod +x ./get_version.sh
          VERSION=$(./get_version.sh ${{ matrix.server }} false)
          echo "version_name=$VERSION" >> $GITHUB_OUTPUT

      - name: Compress Data
        if: steps.update.outputs.major == 'true' && matrix.server != 'JPPC'
        run: |
          7z a "${{ steps.get_version.outputs.version_name }}.zip" Dumps/ FlatData/

      - name: Sync Zip to FlatData Main
        if: steps.update.outputs.major == 'true' && matrix.server != 'JPPC'
        run: |
          git clone git@github.com:beichen23333/BA-FlatData.git
          cd BA-FlatData

          git checkout main
          git pull origin main
          cp "../${{ steps.get_version.outputs.version_name }}.zip" .
          git add "${{ steps.get_version.outputs.version_name }}.zip"
          git commit -m "上传${{ steps.get_version.outputs.version_name }}.zip"
          git push origin main

      - name: Sync FlatData to Server Branch
        if: steps.update.outputs.major == 'true' && matrix.server != 'JPPC'
        run: |
          cd BA-FlatData

          git fetch origin ${{ matrix.server }}
          git checkout ${{ matrix.server }}
          git pull origin ${{ matrix.server }}

          cp -r ../FlatData/* .

          git add .
          if ! git diff-index --quiet HEAD; then
            git commit -m "提交FlatData，版本${{ steps.get_version.outputs.version_name }}"
            git push origin ${{ matrix.server }}
          else
            echo "没有检测到 FlatData 变动，跳过提交。"
          fi

      - name: Update BA-PC-SRC
        if: steps.update.outputs.major == 'true' && matrix.server == 'JPPC'
        run: |
          cd BA-PC-SRC

          git add .
          git commit -m "更新PC源码。"
          git push origin main

      - name: Extractor Workflows
        if: steps.update.outputs.detected == 'true' && matrix.server != 'JPPC'
        run: |
          TYPES=("Table" "Media" "Bundle")
          if [ "${{ matrix.server }}" == "CN" ]; then
            TYPES+=("voice")
          fi
          for type in "${TYPES[@]}"; do
            curl -X POST \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: token ${{ secrets.UPDATE_TOKEN }}" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              https://api.github.com/repos/${{ github.repository }}/dispatches \
              -d "{\"event_type\": \"$type\", \"client_payload\": {\"server\": \"${{ matrix.server }}\"}}"
          done

      - name: Terminate and Trigger Restart
        id: check_reason
        run: |
          echo "should_restart=true" >> $GITHUB_OUTPUT
          gh run cancel ${{ github.run_id }}

  restart:
    needs: update
    if: |
      always() && 
      needs.update.outputs.should_restart == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Restart Workflow
        run: |
          curl -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: token ${{ secrets.UPDATE_TOKEN }}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/${{ github.repository }}/dispatches \
          -d '{"event_type": "restart"}'
